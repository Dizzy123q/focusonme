<!DOCTYPE html>
<html lang="en">
<head>
<!--Tradedoubler site verification 3455202-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="awin-site-verification" content="Awin"/>
<title>Contact — Focus on me</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0f0f0f;
    --white: #ffffff;
    --gray-50: #f9f9f9;
    --gray-100: #f0f0f0;
    --gray-200: #e5e5e5;
    --gray-400: #a0a0a0;
    --gray-600: #666666;
    --radius-md: 16px;
    --radius-lg: 24px;
    --shadow-md: 0 8px 28px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--black);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,255,255,0.90);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 6px rgba(0,0,0,0.06);
  }
  .nav-inner {
    max-width: 760px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 60px;
  }
  .nav-logo { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; text-decoration: none; color: var(--black); }
  .nav-back { font-size: 13px; color: var(--gray-600); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color .2s; }
  .nav-back:hover { color: var(--black); }

  .container { max-width: 760px; margin: 0 auto; padding: 0 2rem; flex: 1; }

  .page-header { padding: 100px 0 3rem; border-bottom: 1px solid var(--gray-200); margin-bottom: 3rem; }
  .page-header h1 { font-size: 36px; font-weight: 500; letter-spacing: -1px; margin-bottom: .5rem; }
  .page-header .meta { font-size: 13px; color: var(--gray-400); }

  .content { padding-bottom: 5rem; }

  p { font-size: 15px; color: var(--gray-600); line-height: 1.8; margin-bottom: .75rem; }

  .contact-cards { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }

  .contact-card {
    background: var(--white);
    box-shadow: var(--shadow-md);
    border-radius: var(--radius-lg);
    padding: 1.75rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .contact-card-left { display: flex; flex-direction: column; gap: 4px; }
  .contact-label { font-size: 11px; font-weight: 500; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; }
  .contact-value { font-size: 17px; font-weight: 500; color: var(--black); letter-spacing: -0.3px; }
  .contact-desc { font-size: 13px; color: var(--gray-400); margin-top: 2px; }

  .contact-btn {
    background: var(--black); color: var(--white);
    border: none; padding: 11px 22px; border-radius: 50px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: inherit; text-decoration: none;
    transition: opacity .2s; white-space: nowrap;
  }
  .contact-btn:hover { opacity: .8; }

  footer { border-top: 1px solid var(--gray-200); padding: 2rem 0; }
  .footer-inner { gap: 2rem; }
  .footer-inner { display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
  .footer-links { display: flex; gap: 1.75rem; }
  .footer-links a { font-size: 13px; color: var(--gray-400); text-decoration: none; transition: color .2s; }
  .footer-links a:hover { color: var(--black); }
  .footer-copy { font-size: 12px; color: var(--gray-400); }

  @media (max-width: 600px) {
    .nav-inner { padding: 0 1.25rem; }
    .container { padding: 0 1.25rem; }
    .page-header h1 { font-size: 28px; }
    .contact-card { flex-direction: column; align-items: flex-start; gap: 1.25rem; }
    .footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
    .footer-links { flex-wrap: wrap; justify-content: center; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Focus on me</a>
    <a href="index.html" class="nav-back">Back to home</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Contact</h1>
    <div class="meta">We usually reply within 24 hours.</div>
  </div>

  <div class="content">
    <p>Have a question, a bug to report, or just want to say hello? Reach out directly by email.</p>

    <div class="contact-cards">
      <div class="contact-card">
        <div class="contact-card-left">
          <div class="contact-label">Support</div>
          <div class="contact-value">support@focusonme.com</div>
          <div class="contact-desc">App issues, bugs, try-on problems.</div>
        </div>
        <a href="mailto:support@focusonme.com" class="contact-btn">Send email</a>
      </div>
    </div>
  </div>
</div>

<div style="flex:1;"></div>

<footer style="border-top: 1px solid #e5e5e5; padding: 2rem;">
  <div class="footer-inner" style="max-width:760px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:2rem;">
    <div class="footer-logo">focus on me</div>
    <div class="footer-links">
      <a href="privacy-policy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="footer-copy">© 2025 Focus on me SRL</div>
  </div>
</footer>

</body>
</html>
